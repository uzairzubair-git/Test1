<!doctype html>
<html class="m-0 p-0 box-border scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <title>Winner</title>
</head>

<body class="bg-amber-200 text-slate-200">

  <!-- HEADER -->
<header class="px-4 py-5">
<!-- <div class="max-w-72"> -->
        <nav class=" flex justify-center items-center m-3 p-5 ">
            <!-- <div class="aspect-square size-25 gap-3 ">
                <img src="images/The-Academy-Awards.webp" alt="logo" class="max-w-72 h-full" />
                </div> -->
    <nav class="flex justify-center items-center">

      <ul class="flex flex-wrap justify-center gap-4 text-sm md:text-lg">

        <li>
          <a href="Oscar.html"
            class="px-4 py-2 hover:bg-slate-600 rounded-full transition duration-300 text-slate-400">
            Oscars
          </a>
        </li>

        <li>
          <a href="Cannen.html"
            class="px-4 py-2 hover:bg-slate-600 rounded-full transition duration-300 text-slate-400">
            Cannes
          </a>
        </li>

        <li>
          <a href="index.html"
            class="px-4 py-2 hover:bg-slate-600 rounded-full transition duration-300 text-slate-400">
            Contact
          </a>
        </li>

      </ul>

    </nav>

  </header>

  <!-- HERO SLIDER -->
  <main class="px-4 md:px-8 py-6">

    <section
      class="flex gap-6 overflow-x-auto scroll-smooth snap-x snap-mandatory">

      <!-- CARD 1 -->
      <div
        class="relative group min-w-full md:min-w-[85%] lg:min-w-[70%] h-[300px] md:h-[500px] lg:h-[700px] overflow-hidden rounded-2xl snap-center flex-shrink-0">

        <img
          class="w-full h-full object-cover group-hover:scale-105 transition duration-500"
          src="./images/_ copy.jpeg"
          alt="Ben Hur">

        <div
          class="absolute inset-0 bg-black/40 group-hover:bg-black/55 transition">
        </div>

        <div class="absolute bottom-6 left-6 md:bottom-10 md:left-10 text-white">

          <h1 class="text-2xl md:text-5xl font-bold mb-3">
            Ben-Hur
          </h1>

          <button
            class="bg-white text-black px-5 py-2 md:px-6 md:py-3 rounded-full hover:bg-yellow-400 transition">
            Watch Now
          </button>

        </div>

      </div>

      <!-- CARD 2 -->
      <div
        class="relative group min-w-full md:min-w-[85%] lg:min-w-[70%] h-[300px] md:h-[500px] lg:h-[700px] overflow-hidden rounded-2xl snap-center flex-shrink-0">

        <img
          class="w-full h-full object-cover group-hover:scale-105 transition duration-500"
          src="images/_.jpeg"
          alt="LOTR">

        <div class="absolute inset-0 bg-black/40"></div>

        <div class="absolute bottom-6 left-6 md:bottom-10 md:left-10 text-white">

          <h1 class="text-2xl md:text-5xl font-bold mb-3">
            The Lord of the Rings
          </h1>

          <button
            class="bg-white text-black px-5 py-2 md:px-6 md:py-3 rounded-full hover:bg-yellow-400 transition">
            Watch Now
          </button>

        </div>

      </div>

      <!-- CARD 3 -->
      <div
        class="relative group min-w-full md:min-w-[85%] lg:min-w-[70%] h-[300px] md:h-[500px] lg:h-[700px] overflow-hidden rounded-2xl snap-center flex-shrink-0">

        <img
          class="w-full h-full object-cover group-hover:scale-105 transition duration-500"
          src="images/The_Palme_d_or_2025.jpg"
          alt="Titanic">

        <div class="absolute inset-0 bg-black/40"></div>

        <div class="absolute bottom-6 left-6 md:bottom-10 md:left-10 text-white">

          <h1 class="text-2xl md:text-5xl font-bold mb-3">
            Titanic
          </h1>

          <button
            class="bg-white text-black px-5 py-2 md:px-6 md:py-3 rounded-full hover:bg-yellow-400 transition">
            Watch Now
          </button>

        </div>

      </div>

    </section>

  </main>

  <!-- OSCARS SECTION -->
  <section class="relative h-[450px] md:h-[700px] mb-8 m-5 p-4">

    <img
      class="absolute inset-0 w-full h-full object-cover rounded-4xl"
      src="images/AMMP_98O_OscarsSeason_WebBanners_Hero_121625_VG_R1.jpeg"
      alt="Oscars">

    <div class="absolute inset-0 bg-black/50 rounded-4xl"></div>

    <div
      class="relative z-10 flex flex-col items-center justify-center h-full text-center text-white px-6">

      <h1 class="text-3xl md:text-5xl lg:text-7xl font-bold mb-4">
        Celebrating the Art of Cinema
      </h1>

      <p class="text-sm md:text-xl lg:text-2xl max-w-2xl mb-8 text-gray-200">
        Experience timeless stories, iconic performances, and the magic of the silver screen.
      </p>

      <a href="Oscar.html">
        <button
          class="bg-yellow-500 hover:bg-yellow-400 text-black font-semibold px-6 py-3 rounded-full transition duration-300">
          Explore Winners
        </button>
      </a>

    </div>

  </section>

  <!-- CANNES SECTION -->
  <section class="relative h-[450px] md:h-[700px] m-5 p-4">

    <img
      class="absolute inset-0 w-full h-full object-cover rounded-4xl"
      src="images/The_Palme_d_or_2025.jpg"
      alt="Cannes">

    <div class="absolute inset-0 bg-black/55 rounded-4xl"></div>

    <div
      class="relative z-10 flex flex-col items-center justify-center h-full text-center text-white px-6">

      <h1 class="text-3xl md:text-5xl lg:text-7xl font-bold mb-4 tracking-wide">
        Cannes Film Festival
      </h1>

      <p class="text-sm md:text-xl lg:text-2xl max-w-2xl mb-8 text-gray-200">
        Where cinema, elegance, and storytelling meet on the world’s most iconic stage.
      </p>

      <a href="Cannen.html">
        <button
          class="bg-white text-black hover:bg-yellow-400 font-semibold px-6 py-3 rounded-full transition duration-300">
          Explore Festival
        </button>
      </a>

    </div>

  </section>

</body>

</html>
